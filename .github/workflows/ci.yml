name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build
      - name: Upload build for e2e
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 1

  # Tests SQL de sécurité (RLS profiles/admin) — démontrent et verrouillent la
  # non-régression des vulnérabilités P0 (escalade PRO/admin via profiles).
  rls-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: '5432'
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v7
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Run RLS security tests
        run: bash scripts/test-rls.sh

  # Smoke e2e (projet `react`, sans auth) — protège routing, pages publiques,
  # landing et aperçu séance contre les régressions de type "app cassée".
  e2e-smoke:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Download build
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: E2E react (smoke)
        run: npx playwright test --project=react
      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: test-results
          retention-days: 7

  # L'app mobile n'a pas de tests — on garantit au minimum que le TypeScript
  # compile (elle était totalement hors CI).
  mobile-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      - name: Install mobile dependencies
        run: npm ci
        working-directory: mobile
      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: mobile

  # Chaîne d'approvisionnement : scan de secrets déterministe (bloquant) + audit
  # des dépendances (informatif — ne bloque pas sur des CVE préexistantes).
  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Secret scan (blocking on real secrets)
        run: bash scripts/scan-secrets.sh
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: npm audit (web, informational)
        run: npm audit --audit-level=high || true
      - name: npm audit (mobile, informational)
        run: npm audit --audit-level=high || true
        working-directory: mobile
