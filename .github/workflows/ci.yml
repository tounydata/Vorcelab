name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build
      - name: Upload build for e2e
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 1

  # Tests SQL de sécurité (RLS profiles/admin) — démontrent et verrouillent la
  # non-régression des vulnérabilités P0 (escalade PRO/admin via profiles).
  rls-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: '5432'
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v7
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Run RLS security tests
        run: bash scripts/test-rls.sh

  # Smoke e2e (projet `react`, sans auth) — protège routing, pages publiques,
  # landing et aperçu séance contre les régressions de type "app cassée".
  e2e-smoke:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Download build
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: E2E react (smoke)
        run: npx playwright test --project=react
      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: test-results
          retention-days: 7

  # E2E AUTHENTIFIÉS (§7) — projet `react-auth` : parcours connecté réel (dashboard,
  # activités, course, profil, renfo…) via une session de test injectée (auth.setup.ts).
  # Nécessite 3 secrets (SUPABASE_SERVICE_ROLE_KEY, VORCELAB_TEST_EMAIL, VORCELAB_TEST_PASSWORD).
  # Absents (ex. fork) → le job s'ignore proprement au lieu d'échouer.
  e2e-auth:
    runs-on: ubuntu-latest
    needs: verify
    env:
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VORCELAB_TEST_EMAIL: ${{ secrets.VORCELAB_TEST_EMAIL }}
      VORCELAB_TEST_PASSWORD: ${{ secrets.VORCELAB_TEST_PASSWORD }}
    steps:
      - uses: actions/checkout@v7
      - name: Détecter les secrets de test
        id: gate
        run: |
          if [ -n "$VORCELAB_TEST_EMAIL" ] && [ -n "$VORCELAB_TEST_PASSWORD" ] && [ -n "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Secrets E2E authentifiés absents — job ignoré (attendu sur les forks)."
          fi
      - uses: actions/setup-node@v6
        if: steps.gate.outputs.run == 'true'
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: npm ci
      - name: Download build
        if: steps.gate.outputs.run == 'true'
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Install Playwright browsers
        if: steps.gate.outputs.run == 'true'
        run: npx playwright install --with-deps chromium
      - name: E2E react-auth (parcours authentifié)
        if: steps.gate.outputs.run == 'true'
        run: npx playwright test --project=react-auth
      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces-auth
          path: test-results
          retention-days: 7

  # TypeScript mobile + LINT mobile + tests de logique mobile (§7) : la logique pure
  # de `mobile/src/lib` (charge, zones de forme, empreinte snapshot, parité web) est
  # couverte par la suite `npm run test` (job `verify`, cf. tests/mobile*.test.ts).
  # Ce job garde le typecheck ET le lint strict (audit 22/07, Phase 2 — `expo lint`
  # n'ignorait plus aucun fichier, `--max-warnings=0` : la CI échoue au moindre avert.).
  mobile-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      - name: Install mobile dependencies
        run: npm ci
        working-directory: mobile
      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: mobile
      - name: Lint (strict, 0 warning)
        run: npm run lint
        working-directory: mobile

  # Chaîne d'approvisionnement : scan de secrets déterministe (bloquant) + audit
  # des dépendances (informatif — ne bloque pas sur des CVE préexistantes).
  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Secret scan (blocking on real secrets)
        run: bash scripts/scan-secrets.sh
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: npm audit (web, informational)
        run: npm audit --audit-level=high || true
      - name: npm audit (mobile, informational)
        run: npm audit --audit-level=high || true
        working-directory: mobile
