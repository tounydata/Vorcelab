name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build React app
        run: npm run build
        env:
          VITE_MAPTILER_KEY: ${{ secrets.VITE_MAPTILER_KEY }}
          # Stripe Payment Links (modal upgrade PRO). URLs publiques par nature
          # (livrées dans le bundle) — les secrets homonymes les surchargent si définis.
          VITE_STRIPE_MONTHLY_URL: ${{ secrets.VITE_STRIPE_MONTHLY_URL || 'https://buy.stripe.com/5kQ5kv9kS6wg35h6XC4ko00' }}
          VITE_STRIPE_ANNUAL_URL: ${{ secrets.VITE_STRIPE_ANNUAL_URL || 'https://buy.stripe.com/00w9ALeFcf2McFRgyc4ko01' }}
          # Monitoring d'erreurs (docs/sentry-setup.md) — Sentry désactivé si absent
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN || '' }}
      - name: Prepare pages
        run: |
          mkdir -p .pages

          # App React servie à la RACINE du domaine custom (vorcelab.app)
          cp -r dist/. .pages/

          # SPA fallback : toute URL inconnue renvoie l'app
          cp .pages/index.html .pages/404.html

          # Pages publiques du sitemap : GitHub Pages sert le fallback 404.html
          # avec un statut HTTP 404 (non indexable) → on matérialise ces routes
          # en vraies copies d'index.html pour qu'elles répondent 200.
          # Canonical + og:url réécrits par page : sinon chaque copie garde le
          # canonical de la home et Google replie tout sur vorcelab.app/.
          for route in login demo legal/cgu legal/confidentialite; do
            mkdir -p ".pages/$route"
            sed -e "s|href=\"https://vorcelab.app/\"|href=\"https://vorcelab.app/$route/\"|" \
                -e "s|content=\"https://vorcelab.app/\"|content=\"https://vorcelab.app/$route/\"|" \
                .pages/index.html > ".pages/$route/index.html"
          done

          # Domaine custom GitHub Pages
          echo 'vorcelab.app' > .pages/CNAME

          touch .pages/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .pages
      - id: deployment
        uses: actions/deploy-pages@v4
