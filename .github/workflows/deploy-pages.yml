name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Build React app
        run: npm ci && npm run build
      - name: Prepare pages
        run: |
          # React SPA at root — Vite outputs dist/ with base=/Vorcelab/
          cp -r dist/. .pages/

          # Static assets referenced by index.html as /Vorcelab/<file>
          [ -f favicon.svg ] && cp favicon.svg .pages/favicon.svg || true
          [ -f og.svg ]      && cp og.svg      .pages/og.svg      || true

          # 404 → redirect to SPA root (handles bookmarks / direct URL access)
          echo '<!doctype html><meta http-equiv="Refresh" content="0;url=/Vorcelab/">' > .pages/404.html

          touch .pages/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .pages
      - id: deployment
        uses: actions/deploy-pages@v4
