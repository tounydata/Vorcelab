name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Build React app
        run: npm ci && npm run build
      - name: Prepare pages
        run: |
          mkdir -p .pages/app

          # Legacy app at root — copy all JS/CSS assets and legacy.html → index.html + 404.html
          cp legacy.html .pages/index.html
          cp legacy.html .pages/404.html
          cp style.css  .pages/style.css
          for f in *.js; do [ -f "$f" ] && cp "$f" ".pages/$f"; done
          [ -f og.svg ]      && cp og.svg      .pages/og.svg      || true
          [ -f favicon.svg ] && cp favicon.svg .pages/favicon.svg || true

          # React app at /app/ — Vite outputs dist/ with base=/Vorcelab/app/
          cp -r dist/. .pages/app/

          touch .pages/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .pages
      - id: deployment
        uses: actions/deploy-pages@v4
