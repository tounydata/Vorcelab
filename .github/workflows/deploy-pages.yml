name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare stable frontend
        run: |
          mkdir -p .pages
          cp index.html .pages/index.html
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('.pages/index.html')
          html = path.read_text()

          html = re.sub(
            r"function prepareRace\(race\) \{.*?\n\}\n\nfunction showGpxUploadPrompt",
            r"""
function prepareRace(race) {
  (async () => {
    let freshRace = race;
    try {
      if (window.sb && race && race.id) {
        const { data, error } = await window.sb
          .from('race_calendar')
          .select('*')
          .eq('id', race.id)
          .maybeSingle();
        if (!error && data) freshRace = data;
      }
    } catch (e) {
      console.warn('Race reload failed', e);
    }

    showPanel('strategie', document.querySelector('.nbtn[onclick*=\"strategie\"]'));

    const res = document.getElementById('stratResult');
    const drop = document.getElementById('gpxDrop');
    if (res) {
      res.style.display = 'none';
      res.innerHTML = '';
    }
    if (drop) {
      drop.style.display = 'block';
      drop.onclick = () => document.getElementById('gpxFile').click();
    }

    currentRaceContext = freshRace;
    window.currentRaceContext = freshRace;

    if (freshRace && freshRace.gpx_data) {
      try {
        const points = typeof freshRace.gpx_data === 'string'
          ? JSON.parse(freshRace.gpx_data)
          : freshRace.gpx_data;
        if (Array.isArray(points) && points.length) {
          await analyzeGPX(points, freshRace.name || 'Course');
          currentRaceContext = freshRace;
          window.currentRaceContext = freshRace;
          return;
        }
      } catch(e) {
        console.warn('Saved GPX malformed', e);
      }
    }

    showGpxUploadPrompt(freshRace);
  })();
}

function showGpxUploadPrompt""",
            html,
            flags=re.S
          )

          html = re.sub(
            r"function handleGpxDrop\(e\)\{.*?\}\nfunction handleGpxFile\(e\)\{.*?\}\n\nfunction parseGPX\(file, raceCtx=null\)\{.*?\n\}\n\nfunction hav",
            r"""
function handleGpxDrop(e){
  e.preventDefault();
  document.getElementById('gpxDrop').classList.remove('drag');
  const f=e.dataTransfer.files[0];
  if(f&&f.name.toLowerCase().endsWith('.gpx'))parseGPX(f,currentRaceContext||window.currentRaceContext||null);
}
function handleGpxFile(e){
  const f=e.target.files[0];
  if(f)parseGPX(f,currentRaceContext||window.currentRaceContext||null);
}

function parseGPX(file, raceCtx=null){
  if(raceCtx){
    currentRaceContext=raceCtx;
    window.currentRaceContext=raceCtx;
  }
  const reader=new FileReader();
  reader.onload=async e=>{
    const xml=new DOMParser().parseFromString(e.target.result,'text/xml');
    const pts=xml.querySelectorAll('trkpt');
    if(!pts.length){alert('GPX invalide ou vide');return;}
    const points=[];
    pts.forEach(pt=>{
      const lat=parseFloat(pt.getAttribute('lat'));
      const lon=parseFloat(pt.getAttribute('lon'));
      const ele=pt.querySelector('ele');
      points.push({lat,lon,ele:ele?parseFloat(ele.textContent):null});
    });
    window._pendingGpxSave=points;
    await analyzeGPX(points, file.name||'');
  };
  reader.readAsText(file);
}

function hav""",
            html,
            flags=re.S
          )

          html = re.sub(
            r"function resetStrategy\(\)\{.*?\n\}\n\nfunction populateRaceSelector",
            r"""
function resetStrategy(){
  document.getElementById('stratResult').style.display='none';
  document.getElementById('stratResult').innerHTML='';
  const drop=document.getElementById('gpxDrop');
  drop.style.display='block';
  drop.onclick=()=>document.getElementById('gpxFile').click();
  drop.innerHTML=`<div style="font-size:2.5rem;margin-bottom:.75rem">🗺️</div><div style="font-family:var(--display);font-size:1.4rem;letter-spacing:.03em;margin-bottom:.4rem">Déposer le fichier GPX</div><div class="mono">Compatible OpenRunner · Strava · Garmin Connect</div>`;
  document.getElementById('gpxFile').value='';
  window._activeSection=-1;
  window._sectionPolylines=[];
  window._pendingGpxSave=null;
  if(leafletMap){leafletMap.remove();leafletMap=null;}
  if(window._gpxChart){window._gpxChart.destroy();window._gpxChart=null;}
}

function populateRaceSelector""",
            html,
            flags=re.S
          )

          html = re.sub(
            r"function selectRaceForStrategy\(race\)\{.*?\n\}\n\n\n// ════════════════════════════════════════════════════\n// PROFIL OVERLAY",
            r"""
function selectRaceForStrategy(race){
  document.querySelectorAll('.race-sel-btn').forEach(b=>b.classList.remove('active'));
  if(window.event&&window.event.target)window.event.target.classList.add('active');
  prepareRace(race);
}


// ════════════════════════════════════════════════════
// PROFIL OVERLAY""",
            html,
            flags=re.S
          )

          patch = r'''
<script>
(function(){
  function safeNumber(v, fallback=0){
    const n = Number(v);
    return Number.isFinite(n) ? n : fallback;
  }
  function safeFixed(v, digits=1, fallback='—'){
    const n = Number(v);
    return Number.isFinite(n) ? n.toFixed(digits) : fallback;
  }
  const originalBuildSplitsTable = window.buildSplitsTable;
  window.buildSplitsTable = function(sections){
    try{
      if(!Array.isArray(sections) || !sections.length){
        return '<div class="mono t3">Aucun segment exploitable.</div>';
      }
      const rows = sections.map((s,i)=>{
        const dist = safeNumber(s.dist ?? s.distance ?? s.km ?? 0,0);
        const gain = safeNumber(s.gain ?? s.elevGain ?? s.dPlus ?? 0,0);
        const loss = safeNumber(s.loss ?? s.elevLoss ?? s.dMinus ?? 0,0);
        const grade = safeNumber(s.grade ?? s.slope ?? 0,0);
        const type = s.type || (grade > 3 ? 'Montée' : grade < -3 ? 'Descente' : 'Plat');
        const cls = grade > 3 ? 'section-up' : grade < -3 ? 'section-down' : 'section-flat';
        return `<tr class="${cls}">
          <td>${i+1}</td>
          <td>${type}</td>
          <td>${safeFixed(dist,2)} km</td>
          <td>+${safeFixed(gain,0)} / -${safeFixed(loss,0)} m</td>
          <td>${safeFixed(grade,1)}%</td>
        </tr>`;
      }).join('');
      return `<table class="splits-table">
        <thead><tr><th>#</th><th>Type</th><th>Distance</th><th>D+ / D-</th><th>Pente</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }catch(e){
      console.warn('safe buildSplitsTable fallback', e);
      if(typeof originalBuildSplitsTable === 'function'){
        try{return originalBuildSplitsTable(sections || []);}catch(_){/* ignore */}
      }
      return '<div class="mono tr">Erreur de tableau segments. GPX lu, mais segments incomplets.</div>';
    }
  };
})();
</script>
'''
          html = html.replace('</body>', patch + '\n</body>')
          path.write_text(html)
          Path('.pages/404.html').write_text(html)
          PY
          touch .pages/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .pages
      - id: deployment
        uses: actions/deploy-pages@v4
