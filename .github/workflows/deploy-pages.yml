name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build React app
        run: npm run build
      - name: Prepare pages
        run: |
          mkdir -p .pages

          # App React servie à la RACINE du domaine custom (vorcelab.app)
          cp -r dist/. .pages/

          # SPA fallback : toute URL inconnue renvoie l'app
          cp .pages/index.html .pages/404.html

          # Domaine custom GitHub Pages
          echo 'vorcelab.app' > .pages/CNAME

          touch .pages/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .pages
      - id: deployment
        uses: actions/deploy-pages@v4
