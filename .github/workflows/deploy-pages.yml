name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build React app
        run: npm run build
      - name: Prepare pages
        run: |
          mkdir -p .pages .pages/app

          # Root — redirect immédiat vers l'app React
          printf '<meta http-equiv="refresh" content="0;url=/Vorcelab/app/"><script>location.replace("/Vorcelab/app/")</script>' > .pages/index.html
          printf '<meta http-equiv="refresh" content="0;url=/Vorcelab/app/"><script>location.replace("/Vorcelab/app/")</script>' > .pages/404.html

          # Assets pour la page de redirection racine
          cp style.css  .pages/style.css
          [ -f og.svg ]      && cp og.svg      .pages/og.svg      || true
          [ -f favicon.svg ] && cp favicon.svg .pages/favicon.svg || true

          # React app
          cp -r dist/. .pages/app/

          touch .pages/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .pages
      - id: deployment
        uses: actions/deploy-pages@v4
