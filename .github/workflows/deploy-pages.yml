name: Deploy Pages

# §7 : le déploiement DÉPEND du succès de la CI. Au lieu de partir en parallèle sur chaque
# push `main`, ce workflow se déclenche APRÈS la fin de la CI (`workflow_run`) et ne construit
# que si elle a RÉUSSI (garde `if` ci-dessous) → plus de mise en prod d'un `main` rouge.
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Job BUILD séparé du DEPLOY (patron GitHub recommandé) : ainsi, relancer le job
  # `deploy` (ex. après une erreur transitoire de l'API Pages) ne ré-uploade PAS
  # l'artifact — ce qui évitait l'erreur « Multiple artifacts named github-pages ».
  build:
    # Ne déploie que si la CI a réussi (ou déclenchement manuel explicite).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build React app
        run: npm run build
        env:
          VITE_MAPTILER_KEY: ${{ secrets.VITE_MAPTILER_KEY }}
          # Stripe Payment Links (modal upgrade PRO). URLs publiques par nature
          # (livrées dans le bundle) — les secrets homonymes les surchargent si définis.
          VITE_STRIPE_MONTHLY_URL: ${{ secrets.VITE_STRIPE_MONTHLY_URL || 'https://buy.stripe.com/5kQ5kv9kS6wg35h6XC4ko00' }}
          VITE_STRIPE_ANNUAL_URL: ${{ secrets.VITE_STRIPE_ANNUAL_URL || 'https://buy.stripe.com/00w9ALeFcf2McFRgyc4ko01' }}
          # Monitoring d'erreurs (docs/sentry-setup.md). La DSN est publique par
          # conception (livrée dans le bundle) — le secret homonyme la surcharge.
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN || 'https://8e067677f4224eb5934b729fccb2d46f@o4511670068314112.ingest.de.sentry.io/4511670074277968' }}
      - name: Prepare pages
        run: |
          # Routes publiques + 404.html + CNAME — logique partagée avec
          # Cloudflare Pages (voir docs/cloudflare-migration.md)
          node scripts/pages-postbuild.mjs --github

          mkdir -p .pages
          # App React servie à la RACINE du domaine custom (vorcelab.app)
          cp -r dist/. .pages/
          touch .pages/.nojekyll
      - uses: actions/upload-pages-artifact@v5
        with:
          path: .pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      # L'API Pages répond sporadiquement « Deployment failed, try again later »
      # (incident côté GitHub) : 1ʳᵉ tentative non bloquante puis re-tentative après
      # 60 s dans le MÊME run. Comme l'upload est fait dans le job `build`, relancer
      # ce job `deploy` ne crée jamais de doublon d'artifact.
      - id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Pause avant re-tentative (API Pages transitoire)
        if: steps.deployment.outcome == 'failure'
        run: sleep 60
      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
