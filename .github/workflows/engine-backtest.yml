name: Engine backtest (real)

# Banc de validation RÉEL du moteur de projection, sur les vraies courses Supabase.
#
# LECTURE SEULE : le script ne fait que des SELECT (aucune écriture/suppression).
# Déclenchement MANUEL uniquement (workflow_dispatch) → la clé service role n'est
# jamais exposée sur un simple push, et le run ne part que quand tu le décides.
#
# Prérequis (Settings → Secrets and variables → Actions) :
#   • SUPABASE_SERVICE_ROLE_KEY   ← SEUL secret à ajouter (Dashboard Supabase →
#                                   Project Settings → API → service_role).
#   • L'URL est réutilisée depuis le secret existant VITE_SUPABASE_URL (ou
#     SUPABASE_URL s'il est défini). Rien à recréer pour l'URL.
#
# ⚠ SUPABASE_ACCESS_TOKEN (sbp_…) est un jeton de gestion pour déployer les edge
#   functions — ce N'EST PAS la service_role key ; il ne convient pas ici.
#
# Sortie : le rapport PSEUDONYMISÉ (aucune coordonnée GPS, aucun nom) est publié
# comme « artifact » du run, téléchargeable depuis l'onglet Actions.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: engine-backtest
  cancel-in-progress: true

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          # Node 22+ requis : @supabase/supabase-js s'appuie sur le WebSocket natif,
          # absent des versions Node ≤ 20.
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run real backtest (read-only)
        env:
          # Réutilise l'URL déjà configurée (VITE_SUPABASE_URL) si SUPABASE_URL absent.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run backtest:real
      - name: Print report to logs (lisible sur mobile, sans téléchargement)
        if: always()
        run: |
          echo "::group::report.md (rapport pseudonymisé complet)"
          cat artifacts/engine-backtest/report.md 2>/dev/null || echo "(rapport absent)"
          echo "::endgroup::"
      - name: Upload pseudonymised report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: engine-backtest-report
          path: artifacts/engine-backtest/
          retention-days: 14
