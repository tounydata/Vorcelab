# Mises à jour de dépendances — volontairement silencieux.
# 1 seule PR groupée par écosystème, une fois par mois. La CI valide.
# Objectif : rester au courant des correctifs de sécurité sans se noyer sous les mails.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      npm:
        patterns: ['*']

  - package-ecosystem: npm
    directory: /mobile
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      npm:
        patterns: ['*']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      actions:
        patterns: ['*']
